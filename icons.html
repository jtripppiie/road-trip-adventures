<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scalable Canvas Icon Set</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #f4f7fb 0%, #dce6ee 46%, #c9d5df 100%);
      font-family: Arial, sans-serif;
      padding: 18px;
      color: #24313b;
    }

    .wrap {
      width: min(96vw, 1220px);
      background: rgba(255, 255, 255, 0.84);
      backdrop-filter: blur(6px);
      border-radius: 22px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.16);
      padding: 18px;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 16px;
      background: linear-gradient(to bottom, #eef7ff 0%, #f8fbfd 54%, #edf3f8 100%);
      box-shadow: inset 0 0 0 1px rgba(20, 30, 40, 0.08);
    }

    h1 {
      margin: 14px 0 6px;
      font-size: 22px;
    }

    p {
      margin: 4px 0 12px;
      color: #5f6f7c;
      font-size: 14px;
      line-height: 1.45;
    }

    code {
      background: rgba(0, 0, 0, 0.06);
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="iconCanvas"></canvas>
    <h1>Scalable Canvas Icon Set</h1>
    <p>
      One responsive HTML5 Canvas drawing world. Resize the browser window to see viewport scaling.
      To resize or move an object, edit the clearly labeled <code>OBJECT SIZES AND POSITIONS</code> section in the script.
    </p>
  </div>

  <script>
    const canvas = document.getElementById("iconCanvas");
    const ctx = canvas.getContext("2d");
    // Fixed drawing world. The CSS makes this responsive to the viewport.
    const VIEW = {
      width: 1200,
      height: 800
    };

    /*****************************************************************
     * OBJECT SIZES AND POSITIONS
     * ---------------------------------------------------------------
     * This is the main section you edit.
     *
     * x = move object left/right
     * y = move object up/down
     * scale = resize object
     *
     * Examples:
     * scale: 0.50  = half size
     * scale: 1.00  = normal size
     * scale: 1.25  = 25% bigger
     *****************************************************************/
    const SCENE = {
      objects: {
        couch: { x: 50,  y: 85,  scale: 0.52 },
        bed:   { x: 440, y: 80,  scale: 0.54 },
        tree:  { x: 865, y: 165, scale: 0.72 },
        truck: { x: 65,  y: 500, scale: 0.78 },
        desk:  { x: 650, y: 505, scale: 0.70 }
      }
    };

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;

      canvas.width = VIEW.width * dpr;
      canvas.height = VIEW.height * dpr;
      canvas.style.aspectRatio = `${VIEW.width} / ${VIEW.height}`;

      // Draw using normal VIEW coordinates, but keep it crisp on high-DPI screens.
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      render();
    }

    function roundedRect(ctx, x, y, w, h, r) {
      r = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function pseudoRandom(seed) {
      return Math.abs(Math.sin(seed * 12.9898) * 43758.5453) % 1;
    }

    function drawEllipseShadow(x, y, rx, ry, alpha = 0.2) {
      const g = ctx.createRadialGradient(x, y, 10, x, y, rx);
      g.addColorStop(0, `rgba(0,0,0,${alpha})`);
      g.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawFabricTexture(x, y, w, h, density = 80, seed = 1, radius = 22) {
      ctx.save();
      roundedRect(ctx, x, y, w, h, radius);
      ctx.clip();

      for (let i = 0; i < density; i++) {
        const a = pseudoRandom(seed + i * 3.1);
        const b = pseudoRandom(seed + i * 5.7);
        const c = pseudoRandom(seed + i * 9.3);
        const px = x + a * w;
        const py = y + b * h;
        const len = 3 + c * 6;
        const alpha = 0.012 + c * 0.026;

        ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(px + len, py + (a * 2 - 1));
        ctx.stroke();

        ctx.strokeStyle = `rgba(0,0,0,${alpha * 0.7})`;
        ctx.beginPath();
        ctx.moveTo(px, py + 1);
        ctx.lineTo(px + len, py + 1 + (b * 2 - 1));
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawWoodLeg(x, y, w, h) {
      const g = ctx.createLinearGradient(x, y, x + w, y + h);
      g.addColorStop(0, "#7a5536");
      g.addColorStop(0.45, "#5c3d24");
      g.addColorStop(1, "#3f2817");
      ctx.fillStyle = g;
      roundedRect(ctx, x, y, w, h, 7);
      ctx.fill();
    }

    function drawLabel(text, x, y) {
      ctx.save();
      ctx.font = "700 18px Arial";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "rgba(36, 49, 59, 0.74)";
      ctx.fillText(text, x, y);
      ctx.restore();
    }

    function drawPillow(x, y, w, h, topColor, bottomColor, seed = 1) {
      const g = ctx.createLinearGradient(x, y, x, y + h);
      g.addColorStop(0, topColor);
      g.addColorStop(1, bottomColor);
      ctx.fillStyle = g;
      roundedRect(ctx, x, y, w, h, 18);
      ctx.fill();

      ctx.strokeStyle = "rgba(0,0,0,0.1)";
      ctx.lineWidth = 2;
      ctx.stroke();

      const hg = ctx.createLinearGradient(x, y, x, y + h * 0.35);
      hg.addColorStop(0, "rgba(255,255,255,0.3)");
      hg.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = hg;
      roundedRect(ctx, x + 8, y + 8, w - 16, h * 0.28, 12);
      ctx.fill();

      drawFabricTexture(x, y, w, h, 26, seed, 18);
    }

    function drawButton(x, y, r = 6) {
      const g = ctx.createRadialGradient(x - 2, y - 2, 1, x, y, r);
      g.addColorStop(0, "rgba(255,255,255,0.5)");
      g.addColorStop(0.4, "rgba(90,96,104,0.95)");
      g.addColorStop(1, "rgba(35,40,46,1)");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawCouch(x, y, scale = 1) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(scale, scale);

      drawEllipseShadow(300, 360, 270, 35, 0.22);
      drawEllipseShadow(300, 374, 220, 18, 0.1);

      let g = ctx.createLinearGradient(0, 0, 0, 220);
      g.addColorStop(0, "#7d8b97");
      g.addColorStop(0.35, "#677480");
      g.addColorStop(1, "#505b65");
      ctx.fillStyle = g;
      roundedRect(ctx, 70, 0, 500, 190, 42);
      ctx.fill();
      drawFabricTexture(70, 0, 500, 190, 100, 10, 42);

      g = ctx.createLinearGradient(0, 40, 90, 230);
      g.addColorStop(0, "#707d89");
      g.addColorStop(0.45, "#5c6873");
      g.addColorStop(1, "#46515a");
      ctx.fillStyle = g;
      roundedRect(ctx, 0, 85, 105, 190, 34);
      ctx.fill();

      g = ctx.createLinearGradient(495, 40, 600, 230);
      g.addColorStop(0, "#707d89");
      g.addColorStop(0.45, "#5c6873");
      g.addColorStop(1, "#46515a");
      ctx.fillStyle = g;
      roundedRect(ctx, 495, 85, 105, 190, 34);
      ctx.fill();

      drawFabricTexture(0, 85, 105, 190, 60, 11, 34);
      drawFabricTexture(495, 85, 105, 190, 60, 12, 34);

      const cushionW = 150;
      const cushionH = 145;
      const cushionY = 22;

      for (let i = 0; i < 3; i++) {
        const cx = 92 + i * 160;

        g = ctx.createLinearGradient(cx, cushionY, cx, cushionY + cushionH);
        g.addColorStop(0, "#8c99a5");
        g.addColorStop(0.5, "#74828f");
        g.addColorStop(1, "#5e6a74");
        ctx.fillStyle = g;
        roundedRect(ctx, cx, cushionY, cushionW, cushionH, 28);
        ctx.fill();

        const hg = ctx.createLinearGradient(cx, cushionY, cx, cushionY + 45);
        hg.addColorStop(0, "rgba(255,255,255,0.24)");
        hg.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = hg;
        roundedRect(ctx, cx + 8, cushionY + 8, cushionW - 16, 42, 18);
        ctx.fill();

        drawFabricTexture(cx, cushionY, cushionW, cushionH, 45, 20 + i, 28);
        drawButton(cx + cushionW / 2, cushionY + 58, 6);
        drawButton(cx + cushionW / 2, cushionY + 98, 6);
      }

      g = ctx.createLinearGradient(0, 178, 0, 323);
      g.addColorStop(0, "#6e7b87");
      g.addColorStop(0.38, "#5d6974");
      g.addColorStop(1, "#4a545d");
      ctx.fillStyle = g;
      roundedRect(ctx, 35, 178, 530, 145, 40);
      ctx.fill();
      drawFabricTexture(35, 178, 530, 145, 80, 30, 40);

      for (let i = 0; i < 3; i++) {
        const sx = 50 + i * 170;
        const sy = 188;

        g = ctx.createLinearGradient(sx, sy, sx, sy + 110);
        g.addColorStop(0, "#8794a0");
        g.addColorStop(0.4, "#73808b");
        g.addColorStop(1, "#5d6974");
        ctx.fillStyle = g;
        roundedRect(ctx, sx, sy, 160, 108, 26);
        ctx.fill();

        const shine = ctx.createLinearGradient(sx, sy, sx, sy + 35);
        shine.addColorStop(0, "rgba(255,255,255,0.24)");
        shine.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = shine;
        roundedRect(ctx, sx + 10, sy + 8, 140, 28, 14);
        ctx.fill();

        drawFabricTexture(sx, sy, 160, 108, 35, 40 + i, 26);
      }

      g = ctx.createLinearGradient(0, 292, 0, 328);
      g.addColorStop(0, "#55606a");
      g.addColorStop(1, "#434c54");
      ctx.fillStyle = g;
      roundedRect(ctx, 60, 292, 480, 36, 14);
      ctx.fill();

      drawPillow(132, 110, 88, 72, "#d8b278", "#b88748", 51);
      drawPillow(392, 108, 90, 74, "#8fae8f", "#648264", 52);
      drawWoodLeg(88, 315, 28, 52);
      drawWoodLeg(488, 315, 28, 52);

      const overallHighlight = ctx.createLinearGradient(0, 0, 0, 130);
      overallHighlight.addColorStop(0, "rgba(255,255,255,0.12)");
      overallHighlight.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = overallHighlight;
      roundedRect(ctx, 20, 0, 560, 130, 40);
      ctx.fill();

      ctx.restore();
    }

    function drawBed(x, y, scale = 1) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(scale, scale);

      drawEllipseShadow(325, 325, 300, 32, 0.22);
      drawEllipseShadow(325, 338, 240, 18, 0.1);

      let g = ctx.createLinearGradient(0, 0, 0, 160);
      g.addColorStop(0, "#8b5e3c");
      g.addColorStop(0.45, "#6d472d");
      g.addColorStop(1, "#4f331f");
      ctx.fillStyle = g;
      roundedRect(ctx, 40, 10, 570, 110, 24);
      ctx.fill();

      ctx.strokeStyle = "rgba(255,255,255,0.13)";
      ctx.lineWidth = 2;
      for (let px = 130; px <= 520; px += 100) {
        ctx.beginPath();
        ctx.moveTo(px, 26);
        ctx.lineTo(px, 106);
        ctx.stroke();
      }

      g = ctx.createLinearGradient(0, 90, 0, 260);
      g.addColorStop(0, "#f8fafc");
      g.addColorStop(0.4, "#e8eef4");
      g.addColorStop(1, "#d9e2ea");
      ctx.fillStyle = g;
      roundedRect(ctx, 60, 85, 530, 170, 24);
      ctx.fill();

      ctx.strokeStyle = "rgba(0,0,0,0.08)";
      ctx.lineWidth = 2;
      ctx.stroke();

      g = ctx.createLinearGradient(0, 120, 0, 290);
      g.addColorStop(0, "#89a8c4");
      g.addColorStop(0.4, "#6f90ae");
      g.addColorStop(1, "#597892");
      ctx.fillStyle = g;
      roundedRect(ctx, 72, 128, 505, 140, 24);
      ctx.fill();
      drawFabricTexture(72, 128, 505, 140, 55, 80, 24);

      g = ctx.createLinearGradient(0, 108, 0, 165);
      g.addColorStop(0, "#cbd8e4");
      g.addColorStop(1, "#aebfd0");
      ctx.fillStyle = g;
      roundedRect(ctx, 82, 116, 485, 42, 16);
      ctx.fill();

      drawPillow(95, 100, 120, 58, "#fbfdff", "#dfe8ef", 90);
      drawPillow(225, 100, 120, 58, "#fbfdff", "#dfe8ef", 91);
      drawPillow(355, 100, 120, 58, "#fbfdff", "#dfe8ef", 92);
      drawPillow(495, 109, 60, 42, "#d7b682", "#b88b4c", 93);

      g = ctx.createLinearGradient(0, 245, 0, 300);
      g.addColorStop(0, "#734b2f");
      g.addColorStop(0.45, "#5b3924");
      g.addColorStop(1, "#412716");
      ctx.fillStyle = g;
      roundedRect(ctx, 52, 245, 548, 46, 14);
      ctx.fill();

      drawWoodLeg(85, 282, 26, 54);
      drawWoodLeg(530, 282, 26, 54);

      const hg = ctx.createLinearGradient(0, 130, 0, 190);
      hg.addColorStop(0, "rgba(255,255,255,0.16)");
      hg.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = hg;
      roundedRect(ctx, 92, 136, 420, 36, 14);
      ctx.fill();

      ctx.strokeStyle = "rgba(40,55,70,0.15)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(110, 184);
      ctx.quadraticCurveTo(200, 174, 290, 184);
      ctx.quadraticCurveTo(380, 194, 470, 184);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(110, 215);
      ctx.quadraticCurveTo(200, 205, 290, 215);
      ctx.quadraticCurveTo(380, 225, 470, 215);
      ctx.stroke();

      ctx.restore();
    }

    function drawTire(cx, cy, r) {
      let g = ctx.createRadialGradient(cx - r * 0.25, cy - r * 0.25, r * 0.15, cx, cy, r);
      g.addColorStop(0, "#5f6670");
      g.addColorStop(0.25, "#2f343b");
      g.addColorStop(1, "#111418");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();

      g = ctx.createRadialGradient(cx - 4, cy - 4, 2, cx, cy, r * 0.52);
      g.addColorStop(0, "#f8fafc");
      g.addColorStop(0.35, "#cbd5e1");
      g.addColorStop(0.7, "#94a3b8");
      g.addColorStop(1, "#64748b");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.52, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#475569";
      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.14, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawTruck(x, y, scale = 1) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(scale, scale);

      drawEllipseShadow(290, 190, 270, 26, 0.22);
      drawEllipseShadow(290, 202, 215, 14, 0.10);

      let g = ctx.createLinearGradient(0, 0, 0, 120);
      g.addColorStop(0, "#d83434");
      g.addColorStop(0.45, "#bf2020");
      g.addColorStop(1, "#8d1212");
      ctx.fillStyle = g;
      roundedRect(ctx, 40, 60, 320, 85, 18);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.18)";
      roundedRect(ctx, 54, 72, 290, 18, 9);
      ctx.fill();

      g = ctx.createLinearGradient(0, 0, 0, 160);
      g.addColorStop(0, "#ef4444");
      g.addColorStop(0.5, "#d62828");
      g.addColorStop(1, "#991b1b");
      ctx.fillStyle = g;

      ctx.beginPath();
      ctx.moveTo(330, 145);
      ctx.lineTo(330, 58);
      ctx.quadraticCurveTo(332, 36, 354, 36);
      ctx.lineTo(452, 36);
      ctx.quadraticCurveTo(476, 36, 488, 56);
      ctx.lineTo(520, 106);
      ctx.lineTo(520, 145);
      ctx.closePath();
      ctx.fill();

      g = ctx.createLinearGradient(0, 0, 0, 120);
      g.addColorStop(0, "#cf2d2d");
      g.addColorStop(1, "#8f1818");
      ctx.fillStyle = g;
      roundedRect(ctx, 490, 92, 64, 53, 10);
      ctx.fill();

      const glass = ctx.createLinearGradient(0, 0, 0, 70);
      glass.addColorStop(0, "#dff6ff");
      glass.addColorStop(0.55, "#a7d8f5");
      glass.addColorStop(1, "#6aa6c8");
      ctx.fillStyle = glass;

      ctx.beginPath();
      ctx.moveTo(425, 47);
      ctx.lineTo(451, 47);
      ctx.quadraticCurveTo(463, 47, 469, 58);
      ctx.lineTo(487, 88);
      ctx.quadraticCurveTo(490, 94, 485, 94);
      ctx.lineTo(425, 94);
      ctx.closePath();
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(350, 49);
      ctx.lineTo(414, 49);
      ctx.lineTo(414, 94);
      ctx.lineTo(350, 94);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = "rgba(255,255,255,0.65)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(420, 47);
      ctx.lineTo(420, 96);
      ctx.stroke();

      ctx.strokeStyle = "rgba(60, 10, 10, 0.28)";
      ctx.lineWidth = 2;
      roundedRect(ctx, 40, 60, 320, 85, 18);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(330, 145);
      ctx.lineTo(330, 58);
      ctx.quadraticCurveTo(332, 36, 354, 36);
      ctx.lineTo(452, 36);
      ctx.quadraticCurveTo(476, 36, 488, 56);
      ctx.lineTo(520, 106);
      ctx.lineTo(520, 145);
      ctx.closePath();
      ctx.stroke();

      ctx.strokeStyle = "rgba(255,255,255,0.28)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(58, 92);
      ctx.lineTo(500, 92);
      ctx.stroke();

      ctx.strokeStyle = "rgba(80,10,10,0.25)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(414, 49);
      ctx.lineTo(414, 145);
      ctx.stroke();

      ctx.fillStyle = "#d1d5db";
      roundedRect(ctx, 430, 98, 18, 6, 3);
      ctx.fill();

      ctx.strokeStyle = "#475569";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(488, 80);
      ctx.lineTo(504, 72);
      ctx.stroke();
      ctx.fillStyle = "#94a3b8";
      roundedRect(ctx, 502, 64, 18, 14, 4);
      ctx.fill();

      const headlight = ctx.createLinearGradient(0, 0, 0, 20);
      headlight.addColorStop(0, "#fff7cc");
      headlight.addColorStop(1, "#ffd54d");
      ctx.fillStyle = headlight;
      roundedRect(ctx, 538, 103, 12, 20, 4);
      ctx.fill();

      g = ctx.createLinearGradient(0, 0, 0, 24);
      g.addColorStop(0, "#cbd5e1");
      g.addColorStop(0.5, "#94a3b8");
      g.addColorStop(1, "#64748b");
      ctx.fillStyle = g;
      roundedRect(ctx, 522, 126, 38, 14, 5);
      ctx.fill();
      roundedRect(ctx, 28, 128, 20, 12, 4);
      ctx.fill();

      ctx.fillStyle = "rgba(50, 12, 12, 0.22)";
      ctx.beginPath();
      ctx.arc(160, 145, 44, Math.PI, 0);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(430, 145, 44, Math.PI, 0);
      ctx.fill();

      drawTire(160, 148, 42);
      drawTire(430, 148, 42);

      ctx.fillStyle = "rgba(0,0,0,0.12)";
      roundedRect(ctx, 78, 139, 390, 12, 4);
      ctx.fill();

      const overallHighlight = ctx.createLinearGradient(0, 0, 0, 90);
      overallHighlight.addColorStop(0, "rgba(255,255,255,0.12)");
      overallHighlight.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = overallHighlight;
      roundedRect(ctx, 30, 34, 510, 62, 18);
      ctx.fill();

      ctx.restore();
    }

    function drawLeafCluster(x, y, r, c1, c2, c3) {
      const g = ctx.createRadialGradient(x - r * 0.25, y - r * 0.3, r * 0.2, x, y, r);
      g.addColorStop(0, c1);
      g.addColorStop(0.5, c2);
      g.addColorStop(1, c3);
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.12)";
      ctx.beginPath();
      ctx.arc(x - r * 0.22, y - r * 0.25, r * 0.38, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawTrunkTexture(x, y, w, h, lines = 16) {
      ctx.save();
      roundedRect(ctx, x, y, w, h, 18);
      ctx.clip();

      for (let i = 0; i < lines; i++) {
        const px = x + 8 + pseudoRandom(500 + i) * (w - 16);
        const py1 = y + 8 + pseudoRandom(600 + i) * (h - 28);
        const py2 = py1 + 18 + pseudoRandom(700 + i) * 45;

        ctx.strokeStyle = "rgba(60, 35, 18, 0.22)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(px, py1);
        ctx.lineTo(px + (pseudoRandom(800 + i) * 6 - 3), py2);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawTree(x, y, scale = 1) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(scale, scale);

      drawEllipseShadow(180, 360, 150, 24, 0.18);
      drawEllipseShadow(180, 372, 110, 12, 0.08);

      let g = ctx.createLinearGradient(0, 120, 0, 340);
      g.addColorStop(0, "#8a5a32");
      g.addColorStop(0.45, "#6f4627");
      g.addColorStop(1, "#4f311b");
      ctx.fillStyle = g;
      roundedRect(ctx, 140, 180, 80, 165, 18);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.08)";
      roundedRect(ctx, 152, 192, 14, 130, 8);
      ctx.fill();
      drawTrunkTexture(140, 180, 80, 165, 18);

      g = ctx.createLinearGradient(0, 0, 0, 36);
      g.addColorStop(0, "#6d4325");
      g.addColorStop(1, "#4c2e18");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.moveTo(126, 344);
      ctx.quadraticCurveTo(145, 328, 160, 344);
      ctx.quadraticCurveTo(178, 330, 192, 344);
      ctx.quadraticCurveTo(214, 328, 236, 344);
      ctx.lineTo(236, 354);
      ctx.lineTo(126, 354);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = "#5b371f";
      ctx.lineWidth = 12;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(180, 210);
      ctx.lineTo(125, 155);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(180, 205);
      ctx.lineTo(235, 150);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(180, 190);
      ctx.lineTo(180, 130);
      ctx.stroke();

      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.moveTo(130, 160);
      ctx.lineTo(105, 125);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(230, 160);
      ctx.lineTo(258, 125);
      ctx.stroke();

      drawLeafCluster(180, 95, 62, "#8fda63", "#4fae45", "#2e7d32");
      drawLeafCluster(120, 130, 58, "#84d65a", "#4ca844", "#2f7b31");
      drawLeafCluster(240, 130, 58, "#84d65a", "#4ca844", "#2f7b31");
      drawLeafCluster(152, 165, 58, "#7bd14f", "#469c3f", "#2d7130");
      drawLeafCluster(208, 165, 58, "#7bd14f", "#469c3f", "#2d7130");
      drawLeafCluster(180, 145, 70, "#91dc67", "#57b349", "#357f36");
      drawLeafCluster(88, 165, 34, "#79cd53", "#45993d", "#2c7030");
      drawLeafCluster(272, 168, 34, "#79cd53", "#45993d", "#2c7030");
      drawLeafCluster(112, 92, 28, "#8fe069", "#57af4c", "#337d35");
      drawLeafCluster(248, 92, 28, "#8fe069", "#57af4c", "#337d35");

      ctx.fillStyle = "#d94444";
      [[150,128],[210,118],[132,176],[228,170],[182,88]].forEach(([ax, ay]) => {
        ctx.beginPath();
        ctx.arc(ax, ay, 5, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.restore();
    }

    function drawMonitor(x, y, w, h) {
      ctx.save();
      ctx.fillStyle = "#1f2937";
      roundedRect(ctx, x, y, w, h, 8);
      ctx.fill();

      const screen = ctx.createLinearGradient(x, y, x, y + h);
      screen.addColorStop(0, "#dff6ff");
      screen.addColorStop(1, "#78a8c8");
      ctx.fillStyle = screen;
      roundedRect(ctx, x + 8, y + 8, w - 16, h - 18, 5);
      ctx.fill();

      ctx.fillStyle = "#374151";
      roundedRect(ctx, x + w * 0.43, y + h, w * 0.14, 24, 4);
      ctx.fill();
      roundedRect(ctx, x + w * 0.32, y + h + 20, w * 0.36, 10, 5);
      ctx.fill();
      ctx.restore();
    }

    function drawHotelDesk(x, y, scale = 1) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(scale, scale);

      drawEllipseShadow(280, 250, 260, 24, 0.18);

      // Back sign panel.
      let g = ctx.createLinearGradient(0, 0, 0, 120);
      g.addColorStop(0, "#f6ead4");
      g.addColorStop(1, "#dfcaa8");
      ctx.fillStyle = g;
      roundedRect(ctx, 95, 0, 370, 90, 18);
      ctx.fill();
      ctx.strokeStyle = "rgba(99, 67, 35, 0.16)";
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.save();
      ctx.font = "700 32px Georgia";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#6b4423";
      ctx.fillText("HOTEL", 280, 45);
      ctx.restore();

      // Countertop.
      g = ctx.createLinearGradient(0, 105, 0, 155);
      g.addColorStop(0, "#b9834f");
      g.addColorStop(0.5, "#8d5c33");
      g.addColorStop(1, "#5c351d");
      ctx.fillStyle = g;
      roundedRect(ctx, 20, 110, 520, 55, 16);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.16)";
      roundedRect(ctx, 40, 120, 475, 12, 7);
      ctx.fill();

      // Desk body.
      g = ctx.createLinearGradient(0, 160, 0, 305);
      g.addColorStop(0, "#936337");
      g.addColorStop(0.52, "#734822");
      g.addColorStop(1, "#4f2e16");
      ctx.fillStyle = g;
      roundedRect(ctx, 45, 155, 470, 125, 14);
      ctx.fill();

      ctx.strokeStyle = "rgba(35, 20, 10, 0.18)";
      ctx.lineWidth = 2;
      ctx.stroke();

      // Front panels.
      for (let i = 0; i < 3; i++) {
        const px = 70 + i * 150;
        const panel = ctx.createLinearGradient(px, 175, px, 258);
        panel.addColorStop(0, "rgba(255,255,255,0.08)");
        panel.addColorStop(1, "rgba(0,0,0,0.10)");
        ctx.fillStyle = panel;
        roundedRect(ctx, px, 175, 120, 82, 10);
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.12)";
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      // Items on top.
      drawMonitor(95, 50, 95, 65);

      // Bell.
      const bell = ctx.createLinearGradient(365, 88, 365, 125);
      bell.addColorStop(0, "#fff1a8");
      bell.addColorStop(0.5, "#e0b545");
      bell.addColorStop(1, "#a97818");
      ctx.fillStyle = bell;
      ctx.beginPath();
      ctx.moveTo(342, 118);
      ctx.quadraticCurveTo(365, 78, 388, 118);
      ctx.closePath();
      ctx.fill();
      roundedRect(ctx, 336, 117, 58, 8, 4);
      ctx.fill();
      ctx.fillStyle = "#8a5c10";
      ctx.beginPath();
      ctx.arc(365, 84, 6, 0, Math.PI * 2);
      ctx.fill();

      // Key cards.
      ctx.fillStyle = "#f8fafc";
      roundedRect(ctx, 410, 92, 58, 34, 6);
      ctx.fill();
      ctx.fillStyle = "#60a5fa";
      roundedRect(ctx, 418, 101, 24, 5, 3);
      ctx.fill();
      ctx.fillStyle = "#94a3b8";
      roundedRect(ctx, 418, 112, 40, 4, 2);
      ctx.fill();

      ctx.restore();
    }

    function drawSceneBackground() {
      ctx.clearRect(0, 0, VIEW.width, VIEW.height);

      const glow = ctx.createRadialGradient(600, 130, 40, 600, 130, 430);
      glow.addColorStop(0, "rgba(255,255,255,0.72)");
      glow.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, VIEW.width, VIEW.height);

      ctx.strokeStyle = "rgba(80, 100, 115, 0.14)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, 445);
      ctx.lineTo(VIEW.width, 445);
      ctx.stroke();

      const floor = ctx.createLinearGradient(0, 445, 0, VIEW.height);
      floor.addColorStop(0, "rgba(223, 232, 239, 0.86)");
      floor.addColorStop(1, "rgba(201, 213, 223, 0.9)");
      ctx.fillStyle = floor;
      ctx.fillRect(0, 445, VIEW.width, VIEW.height - 445);

      // A subtle guide line that makes object placement easier to see.
      ctx.strokeStyle = "rgba(36, 49, 59, 0.06)";
      ctx.lineWidth = 1;
      for (let x = 0; x <= VIEW.width; x += 100) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, VIEW.height);
        ctx.stroke();
      }
      for (let y = 0; y <= VIEW.height; y += 100) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(VIEW.width, y);
        ctx.stroke();
      }
    }

    function render() {
      drawSceneBackground();

      const { couch, bed, tree, truck, desk } = SCENE.objects;

      drawCouch(couch.x, couch.y, couch.scale);
      drawBed(bed.x, bed.y, bed.scale);
      drawTree(tree.x, tree.y, tree.scale);
      drawTruck(truck.x, truck.y, truck.scale);
      drawHotelDesk(desk.x, desk.y, desk.scale);

      drawLabel("Couch", couch.x, couch.y - 18);
      drawLabel("Bed", bed.x, bed.y - 18);
      drawLabel("Tree", tree.x, tree.y - 18);
      drawLabel("Truck", truck.x, truck.y - 18);
      drawLabel("Front Hotel Desk", desk.x, desk.y - 18);
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();
  </script>
</body>
</html>
